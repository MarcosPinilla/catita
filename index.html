<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Catita ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffe6e6; 
            --text-color: #4a4a4a;
            --btn-bg: #ffffff;
            --btn-hover: #ffb3b3;
            --shadow: rgba(255, 136, 136, 0.3);
            --wsp-color: #25D366;
        }

        /* --- FIX PARA CELULARES --- */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; 
            padding: 20px;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            background: transparent;
            max-width: 550px;
            width: 100%;
            z-index: 10; 
        }

        .gif-container {
            min-height: 230px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            width: 220px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 15px;
            filter: drop-shadow(0px 10px 15px var(--shadow));
            transition: opacity 0.5s ease;
            pointer-events: none; /* Evita que intente guardar la imagen al mantener presionado */
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #333;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 25px;
            padding: 0 15px;
            line-height: 1.4;
        }

        /* Botones de interacción (besos, abrazos, etc.) */
        .interaction-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .interaction-buttons button {
            background-color: var(--btn-bg);
            border: 2px solid transparent;
            color: #ff6b81;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 11;
            touch-action: none; /* Bloquea el zoom sobre los botones */
        }

        .interaction-buttons button:active {
            transform: translateY(2px) scale(0.95);
            background-color: var(--btn-hover);
            color: white;
        }

        /* Contenedor de botones de contacto */
        .contact-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
            border-top: 2px dashed #ffb3b3;
            padding-top: 20px;
        }

        .btn-contact {
            border: none;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 11;
            touch-action: manipulation;
        }

        .btn-contact svg {
            width: 22px;
            height: 22px;
            fill: currentColor; 
        }

        .btn-wsp {
            background-color: var(--wsp-color);
        }

        .btn-wsp:hover, .btn-wsp:active {
            background-color: #1ebd5c;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }

        .btn-ig {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .btn-ig:hover, .btn-ig:active {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(220, 39, 67, 0.4);
            filter: brightness(1.1);
        }

        .floating-emoji {
            position: absolute;
            font-size: 2.5rem; 
            pointer-events: none;
            animation: popAndFloat 2s ease-out forwards;
            z-index: 5; 
        }

        @keyframes popAndFloat {
            0% { transform: scale(0) translateY(0) rotate(0deg); opacity: 1; }
            20% { transform: scale(1.3) translateY(-20px) rotate(10deg); }
            100% { transform: scale(1) translateY(-150px) rotate(-15deg); opacity: 0; }
        }
    </style>
</head>
<body>

        function updateContentByTime() {
            const now = new Date();
            const hour = now.getHours();
            const todayStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
            
            // Verificación del cumpleaños: Mes 6 (Julio) y Día 16
            const isBirthday = (now.getMonth() === 6 && now.getDate() === 16);
            
            let currentData;
            let blockName;

            if (isBirthday) {
                currentData = contentDB.cumpleanos;
                blockName = "cumpleanos";
            } else if (hour >= 5 && hour < 12) {
                currentData = contentDB.manana;
                blockName = "manana";
            } else if (hour >= 12 && hour < 15) {
                currentData = contentDB.almuerzo;
                blockName = "almuerzo";
            } else if (hour >= 15 && hour < 18) {
                currentData = contentDB.tarde;
                blockName = "tarde";
            } else if (hour >= 18 && hour < 21) {
                currentData = contentDB.iglesia;
                blockName = "iglesia";
            } else {
                currentData = contentDB.noche;
                blockName = "noche";
            }

            // Lógica de LocalStorage para mantener el estado
            const savedDate = localStorage.getItem('catita_date');
            const savedBlock = localStorage.getItem('catita_block');
            
            let titleIdx, descIdx, gifIdx;

            if (savedDate === todayStr && savedBlock === blockName) {
                titleIdx = parseInt(localStorage.getItem('catita_titleIdx'));
                descIdx = parseInt(localStorage.getItem('catita_descIdx'));
                gifIdx = parseInt(localStorage.getItem('catita_gifIdx'));
            } else {
                titleIdx = Math.floor(Math.random() * currentData.titles.length);
                descIdx = Math.floor(Math.random() * currentData.descs.length);
                gifIdx = Math.floor(Math.random() * currentData.gifs.length);

                localStorage.setItem('catita_date', todayStr);
                localStorage.setItem('catita_block', blockName);
                localStorage.setItem('catita_titleIdx', titleIdx);
                localStorage.setItem('catita_descIdx', descIdx);
                localStorage.setItem('catita_gifIdx', gifIdx);
            }

            document.getElementById('greeting-title').innerText = currentData.titles[titleIdx];
            document.getElementById('greeting-desc').innerText = currentData.descs[descIdx];
            document.getElementById('main-gif').src = currentData.gifs[gifIdx];
        }

        function spawnEmojis(emojiType) {
            const numEmojis = Math.floor(Math.random() * 8) + 10; 

            for (let i = 0; i < numEmojis; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.classList.add('floating-emoji');
                    emoji.innerText = emojiType;
                    
                    const startX = Math.random() * window.innerWidth;
                    const startY = Math.random() * window.innerHeight;

                    emoji.style.left = `calc(${startX}px - 20px)`;
                    emoji.style.top = `${startY}px`;

                    document.body.appendChild(emoji);

                    setTimeout(() => {
                        emoji.remove();
                    }, 2000);
                }, i * 40); // Más rápido para el efecto metralleta
            }
        }

        function sendWSP() {
            const tuNumero = "56987793078"; 
            const mensaje = "¡Holi! Acabo de entrar a tu regalito y quería hablarte un ratito o mandarte un sticker 🥺💖";
            const urlWhatsApp = `https://wa.me/${tuNumero}?text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhatsApp, '_blank');
        }

        function sendIG() {
            const tuUsuarioIg = "marcosalexanderr"; 
            const urlInstagram = `https://ig.me/m/${tuUsuarioIg}`;
            window.open(urlInstagram, '_blank');
        }

        window.onload = updateContentByTime;
    </script>
</body>
